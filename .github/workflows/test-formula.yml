name: Test formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - ".github/workflows/test-formula.yml"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/test-formula.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: brew style + install + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # `brew install --formula <path>` is rejected by Homebrew with
      # "formulae must be in a tap"; `brew test <name>` only resolves
      # tap-registered formulae. Symlink the checkout into the standard
      # tap location so install + test work by name (slima4/claude-tui/claude-tui).
      - name: Register checkout as local tap
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/${OWNER}/homebrew-claude-tui"
          mkdir -p "$(dirname "${TAP_DIR}")"
          rm -rf "${TAP_DIR}"
          ln -s "${GITHUB_WORKSPACE}" "${TAP_DIR}"

      - name: brew style
        env:
          OWNER: ${{ github.repository_owner }}
        run: brew style "${OWNER}/claude-tui/claude-tui"

      - name: brew install --build-from-source
        env:
          OWNER: ${{ github.repository_owner }}
        run: brew install --build-from-source "${OWNER}/claude-tui/claude-tui"

      - name: brew test
        env:
          OWNER: ${{ github.repository_owner }}
        run: brew test --verbose "${OWNER}/claude-tui/claude-tui"

      - name: Smoke test installed binary
        # Fresh shell invocation — brew test runs assertions in a sandboxed
        # context. This confirms PATH and shebang are wired up after install.
        run: claudetui --version
